<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    .notif-container {
      max-width: 500px;
      margin: 3rem auto;
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 2rem;
      padding: 2rem;
      color: #fff;
    }
    .notif-title {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 1rem;
    }
    .notif-list {
      margin-top: 1rem;
      background: #222;
      border-radius: 1rem;
      padding: 1rem;
      max-height: 300px;
      overflow-y: auto;
    }
    .notif-item {
      font-size: 1rem;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      background: #10b98122;
      color: #10b981;
    }
    .notif-item.warning {
      background: #f59e0b22;
      color: #f59e0b;
    }
    .notif-item.error {
      background: #ef444422;
      color: #ef4444;
    }
    .notif-item.success {
      background: #10b98144;
      color: #10b981;
    }
    .notif-actions {
      margin-top: 1rem;
      text-align: right;
    }
    .notif-actions button {
      background: #10b981;
      color: #111;
      font-weight: bold;
      border: none;
      border-radius: 1rem;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      margin-left: 1rem;
      transition: background 0.2s;
    }
    .notif-actions button:hover {
      background: #059669;
    }
  </style>
</head>
<body>
  <section class="notif-container">
    <header class="notif-title">Notifications</header>
    <div class="notif-list" id="notif-list"></div>
    <div class="notif-actions">
      <button id="mark-read">Mark all as read</button>
      <button id="close-notif">Close</button>
    </div>
  </section>
  <script src="notifications.js"></script>
</body>
</html>
